# Render Blueprint — https://render.com/docs/infrastructure-as-code
# yaml-language-server: $schema=https://render.com/schema/render.yaml.json

services:
  - type: web
    name: travel-agent-api
    runtime: python
    plan: free
    region: oregon
    branch: main
    autoDeploy: true
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn src.api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: DATA_MODE
        value: auto
      - key: ALLOWED_ORIGINS
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: API_SECRET
        sync: false
